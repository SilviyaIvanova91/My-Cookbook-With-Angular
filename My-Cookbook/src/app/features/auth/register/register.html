<div class="page-wrapper">
  <!-- Register card -->
  <div class="card">
    <div class="card-inner">
      <h1 class="brand">COOKBOOK</h1>
      <div class="divider-lines">
        <span></span>
        <span></span>
      </div>
      <p class="subtitle">Create your account</p>

      <form class="register" (ngSubmit)="onRegister()">
        <div class="field">
          <input
            type="text"
            id="username"
            name="username"
            placeholder=" "
            [(ngModel)]="username"
            required
          />
          <label for="username">Username</label>
        </div>

        <div class="field">
          <input
            type="email"
            id="email"
            name="email"
            placeholder=" "
            [(ngModel)]="email"
            required
          />
          <label for="email">Email</label>
        </div>

        <div class="field">
          <input
            type="password"
            id="password"
            name="password"
            placeholder=" "
            [(ngModel)]="password"
            required
          />
          <label for="password">Password</label>
        </div>

        <div class="field">
          <input
            type="password"
            id="confirmPass"
            name="confirmPass"
            placeholder=" "
            [(ngModel)]="confirmPass"
            required
          />
          <label for="confirmPass">Confirm Password</label>
        </div>

        <button type="submit">Register</button>
      </form>

      @if (error) {
        <p class="error-msg">{{ error }}</p>
      }

      <p class="login-link">Already have an account? <a routerLink="/login">Sign in</a></p>
    </div>
  </div>
</div>
