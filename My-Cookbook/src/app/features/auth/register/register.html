<div class="page-wrapper">
  <!-- Scattered food decorations -->
  <span class="deco deco-6">🍲</span>
  <span class="deco deco-7">🍄</span>
  <span class="deco deco-8">🥐</span>
  <span class="deco deco-9">🍤</span>
  <span class="deco deco-10">🧀</span>
  <span class="deco deco-11">🍄</span>
  <span class="deco deco-12">🍲</span>

  <!-- Diagonal light streaks -->
  <div class="streak streak-1"></div>
  <div class="streak streak-2"></div>

  <!-- Register card -->
  <div class="card">
    <div class="card-inner">
      <h1 class="brand">COOKBOOK</h1>
      <div class="divider-lines">
        <span></span>
        <span></span>
      </div>
      <p class="subtitle">Create your account</p>

      <form>
        <div class="field">
          <input type="text" id="fullname" placeholder=" " required />
          <label for="fullname">Full Name</label>
        </div>
        <div class="field">
          <input type="email" id="email" placeholder=" " required />
          <label for="email">Email</label>
        </div>
        <div class="field">
          <input type="password" id="password" placeholder=" " required />
          <label for="password">Password</label>
        </div>
        <div class="field">
          <input type="password" id="confirm" placeholder=" " required />
          <label for="confirm">Confirm Password</label>
        </div>

        <button type="submit">Register</button>
      </form>

      <p class="login-link">Already have an account? <a href="/login">Sign in</a></p>
    </div>
  </div>
</div>
